kind = "mobile"
previewPath = "/"
title = "eCompara"
version = "1.0.0"
id = "artifacts/ecompara"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 23273
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ecompara run dev"

[services.env]
PORT = "23273"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ecompara", "run", "build"]

[services.production.run]
args = ["pnpm", "--filter", "@workspace/ecompara", "run", "serve"]

[services.production.run.env]
PORT = "23273"
BASE_PATH = "/"
